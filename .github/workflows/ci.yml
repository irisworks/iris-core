name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: iris-runtime
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: iris-runtime/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Smoke test (bridge-only boot)
        run: bash scripts/smoke.sh
