name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan full git history for secrets
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz | tar xz gitleaks
          ./gitleaks git --no-banner --redact .

  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: iris-runtime
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: iris-runtime/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Dispatch regression suite
        run: npm test
      - name: Smoke test (bridge-only boot)
        run: bash scripts/smoke.sh
